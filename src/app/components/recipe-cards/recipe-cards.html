<mat-card class="recipe-card">
  <mat-card-header>
    <mat-card-title>{{ recipe.title }}</mat-card-title>
    <mat-card-subtitle>{{ recipe.createdAt | date:'short' }}</mat-card-subtitle>

    <button mat-icon-button (click)="onToggleFavorite()">
      @if (recipe.favorite) {
        <mat-icon color="warn">favorite</mat-icon>
      } @else {
        <mat-icon>favorite_border</mat-icon>
      }
    </button>
  </mat-card-header>

  <mat-card-content>
    <p>{{ recipe.description }}</p>
    <mat-list>
      @for (ingredient of recipe.ingredients; track ingredient.id) {
        <mat-list-item>
          {{ ingredient.name }} - {{ ingredient.quantity }}
        </mat-list-item>
      }
    </mat-list>
  </mat-card-content>

  <mat-card-actions>
    <button mat-button color="primary" (click)="onEdit()">Edit</button>
    <button mat-button color="warn" (click)="onDelete()">Delete</button>
  </mat-card-actions>
</mat-card>
