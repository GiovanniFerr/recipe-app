<div class="recipe-form">
  <h2>Create Recipe</h2>
  <form #form="ngForm" (ngSubmit)="save(form)">
    <mat-form-field appearance="fill">
      <mat-label>Title</mat-label>
      <input matInput name="title" [(ngModel)]="title" required />
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Description</mat-label>
      <textarea matInput name="description" [(ngModel)]="description" required></textarea>
    </mat-form-field>

    <div class="ingredients-section">
      <h3>Ingredients</h3>
      <button mat-mini-fab color="primary" type="button" (click)="addIngredient()">
        <mat-icon>add</mat-icon>
      </button>

      @for (ingredient of ingredients; track ingredient.id) {
        <div class="ingredient-item">
          <input matInput placeholder="Name" [(ngModel)]="ingredient.name" name="name-{{ingredient.id}}" required />
          <input matInput placeholder="Quantity" [(ngModel)]="ingredient.quantity" name="qty-{{ingredient.id}}" required />
          <button mat-icon-button color="warn" type="button" (click)="removeIngredient(ingredient.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      }
    </div>

    <button mat-raised-button color="primary" type="submit">Save Recipe</button>
  </form>
</div>
